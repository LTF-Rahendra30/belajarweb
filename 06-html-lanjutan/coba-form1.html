<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coba Form</title>
</head>
<body>
    <h1>Contoh Form</h1>
    <form>
        <label for="nama">Nama: </label>
        <input type="text" name="nama" id="nama">
        <br>

        <label for="password">Password</label>
        <input type="password" name="password" id="password">
        <br>

        <label for="email">Email: 
            <input type="email" name="email" id="email">
        </label>
        <br>

        <label for="angka">Angka: 
            <input type="number" name="number" id="angka"
            min="0" max="100">
        </label>
        <br>

        <label for="tanggal">Tanggal
            <input type="date" name="tanggal" id="tanggal">
        </label>
        <br>

        <label for="warna">Warna
            <input type="color" name="warna" id="warna">
        </label>
        <br>

        <label for="url">URL
            <input type="url" name="url" id="url">
        </label>
        <br>

        <label for="tel">Telepon
            <input type="tel" name="tel" id="tel">
        </label>
        <br>

        <label for="file">File
            <input type="file" name="file" id="file">
        </label>
        <br>

        <label for="radio">Radio
            <input type="radio" name="radio" id="radio">
        </label>
        <br>

        <label for="check">Check Box
            <input type="checkbox" name="check" id="check">
        </label>
        <br>
        
        <button type="submit">Kirim</button>
    </form>
</body>
</html>
