<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coba Complex Tabel</title>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th></th>
                <th>Kolom 1</th>
                <th>Kolom 2</th>
                <th>Kolom 3</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th>Baris 1</th>
                <td>Kolom 1, Kolom 2 , Kolom 3</td>
            </tr>
            <tr>
                <th>Baris 2</th>
                <td>Baris 2, Kolom 2, Kolom 3</td>
            </tr>
            <tr>
                <th>Baris 3</th>
                <td>Baris 3, Kolom 2, Kolom 3</td>
            </tr>
        </tbody>

    </table>
</body>
</html>
