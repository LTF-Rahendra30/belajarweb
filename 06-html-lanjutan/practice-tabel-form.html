<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form & Tabel</title>
</head>
<body>
    <h1>Contoh Form didalam Tabel</h1>
    <form>

        <table cellpadding="5">
            <tr>
                <td align="right">
                    <label for="nama">Nama: </label>
                </td>
                <td>
                    <input type="text" name="nama" id="nama" autocomplete="off">
                </td>
            </tr>
            <tr>
                <td align="right">
                    <label for="password">Password</label>
                </td>
                <td>
                    <input type="password" name="password" id="password" autocomplete="off">
                </td>
            </tr>
            <tr>
                <td align="right">
                    <label for="email">Email: </label>
                </td>
                <td>
                    <input type="email" name="email" id="email" autocomplete="off">
                </td>
            </tr>
            <tr>
                <td align="right">
                    <label for="angka">Angka: </label>
                </td>
                <td>
                    <input type="number" name="number" id="angka" min="0" max="100">
                </td>
            </tr>
            <tr>
                <td align="right">
                    <label for="tanggal">Tanggal</label>
                </td>
                <td>              
                    <input type="date" name="tanggal" id="tanggal" autocomplete="off">
                </td>
            </tr>
            <tr>
                <td align="right">
                    <label for="warna">Warna</label>               
                </td>
                <td>
                    <input type="color" name="warna" id="warna">
                </td>
            </tr>
            <tr>
                <td align="right">
                    <label for="tel">Telepon</label>
                </td>
                <td>
                    <input type="tel" name="tel" id="tel" autocomplete="off">
                </td>
            </tr>
            <tr>
                <td align="right">
                    <label for="file">File</label>
                </td>
                <td>
                    <input type="file" name="file" id="file">
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <button type="submit">Kirim</button>
                </td>
            </tr>
        </table>   
    </form>

</body>
</html>
