<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coba Background2</title>
    <style>
        body{
            background-color: bisque;
            background-image: linear-gradient( bisque,white);
            height: 100vh;
        }
        .box1{
            width: 200px;
            height: 200px;
            background-image: radial-gradient(white,pink);
            
        }
        .box2{
            width: 200px;
            height: 200px;
            background-color: rgb(199, 66, 18);
            background-image: linear-gradient(purple,white);
            
        }
        .box3{
            width: 200px;
            height: 200px;
            background-color: rgb(199, 66, 18);
            background-image: conic-gradient(blue,green,white);
            
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>
</html>
