<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Background</title>
    <style>
        body{
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #333;
        }
        .frame{
            width: 400px;
            height: 400px;
            border: 10px solid whitesmoke;
            margin: auto;
            background-image: url(assets/images/Bernadya-removebg-preview.png), url(assets/images/IMG_20260516_114609.png), url(assets/images/IMG_20260516_114630.png), linear-gradient(purple,orange, red);
            background-size: 250px, 300px, 500px,100vh;
            background-repeat: no-repeat,no-repeat,no-repeat,no-repeat;
            background-position: center bottom,center bottom, right center,center bottom;
            border-radius: 20px;
        }
        h1{
            color: white;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-size: 50px;
            text-shadow: 2px 2px 4px black;
        }
    </style>
</head>
<body>
    <h1>Profile Card</h1>
    <div class="frame"></div>
</body>
</html>
