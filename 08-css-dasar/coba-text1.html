<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Decoration</title>
    <style>
        h1{
            font-size: 40px;
            text-align: center;
            text-transform: uppercase;
            text-decoration: underline;
            
        }
        h2{
            font-size: 30px;
            text-align: left;
            color: chocolate;

        }
        p {
            font-size: 20px;
            text-align: justify;
            font-family: "Arial";
        }
    </style>
</head>
<body>
    <h1>Hello CSS</h1>

    <h2>Judul 1</h2>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Cum maiores fugiat unde delectus minus illo laboriosam soluta voluptates. Aperiam veniam cumque quaerat corporis et, at commodi asperiores. Et, ab illum.</p>

    
</body>
</html>
