<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coba Text Overflow & Shadow</title>
    <style>
        p {
            font-size: 25px;
            white-space: nowrap;
            width: 300px;
            background-color: antiquewhite;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        h1{
            color: rgb(252, 254, 255);
            font-size: 80px;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            text-shadow: 0px 0px 20px rgb(253, 76, 105), 0px 0px 40px rgb(240, 113, 134),
            0px 0px 50px rgb(254, 179, 192);
        }
    </style>
</head>
<body>
    <h1>Hello CSS</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Minus ipsam deleniti temporibus laudantium sapiente repellendus sequi, amet eius perspiciatis molestias!</p>
</body>
</html>
