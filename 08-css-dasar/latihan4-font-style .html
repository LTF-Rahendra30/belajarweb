<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 2</title>
    <style>
        *, *::before, *::after {
        box-sizing: border-box;
        }
        
        h1{
            text-align: center;
            font-size: 50px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            text-decoration: underline;
            text-decoration-color: #34708e;
            text-shadow: 5px 2px 2px rgb(215 215 215 / 40%);
            color: #38bafa;

        }
        .box{
            border:30px solid #f8f8ff;
            height: 320px;
            border-radius: 8px;
            border: 5px solid crimson;
            box-sizing: border-box;
            margin-top: 40px;
            margin: 60px;
    

        }
        .content{
            width: 100%;
            font-size: 25px;
            font-family: monospace;
            text-align: center;
            word-spacing: 12px;
            line-height: 2em;
            color: #f8f8ff;
            padding: 10px;
            
        }
        body{
            background-color: #0f1720
        }
    </style>
</head>
<body>
    <h1>Life Like a Coding</h1>
    <div class="box">
        <div class="content">

            <p>Hidup itu seperti koding; jika ada bug, jangan menyerah. Perbaiki, compile ulang, dan tunjukkan pada dunia bahwa kamu bisa</p>
        
            <p>Kesalahan bukan tanda kegagalan, melainkan bukti bahwa kamu berani mencoba sesuatu yang orang lain takutkan</p>
        </div>
    </div>
</body>
</html>
