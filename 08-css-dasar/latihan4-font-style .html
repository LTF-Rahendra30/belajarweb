<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 2</title>
    <style>
        *, *::before, *::after {
        box-sizing: border-box;
        }
        
        h1{
            background: linear-gradient(to right, #00e676, #b44fd4, #38bafa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            font-size: 60px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            text-shadow: 0px 0px 12px rgb(215 215 215 / 40%);
            
            
        }
        .box{
            border:1px solid #15155f;
            min-height: 320px;
            border-radius: 50px;
            margin: 100px;
            background-color: rgba(15, 3, 65, 0.425);
            box-shadow:0px 1px 10px 3px rgb(3, 6, 55);
    
            
        }
        .content{
            width: 100%;
            font-size: 25px;
            font-family: monospace;
            text-align: center;
            word-spacing: 12px;
            line-height: 2em;
            color: #f8f8ff;
            padding: 10px;
            text-shadow: 0px 0px 10px rgb(215 215 215 / 40%);
            
        }
        body{
            background-color: #0f1720;
            background-image:linear-gradient(to bottom, rgb(15 23 40 / 50%)), url(assets/images/Auurora3.jpg);
            background-size: cover;
            background-repeat: no-repeat;
            min-height: 100vh;
            background-position: center;
        }
        span{
            color: crimson;
            font-weight: bolder;
        }
    </style>
</head>
<body>
    <h1>Life Like a Coding</h1>
    <div class="box">
        <div class="content">

            <p>Hidup itu seperti koding; jika ada bug, jangan <span>Menyerah</span> Perbaiki, compile ulang, dan tunjukkan pada dunia bahwa kamu bisa</p>
        
            <p>Kesalahan bukan tanda <span>kegagalan</span>, melainkan bukti bahwa kamu berani mencoba sesuatu yang orang lain takutkan</p>
            
        </div>
    </div>
</body>
</html>
