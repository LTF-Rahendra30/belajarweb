<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 5</title>
    <style>
        body{
            background-color: #0f1720;
            background-image:linear-gradient(to bottom, rgb(15 23 40 / 90%)40%,rgb(15 23 40 / 40%)), url(assets/images/Aurora2.jpeg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        h1{
            font-size: 4em;
            text-align: center;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            /* text-shadow: 5px 2px 2px rgb(215 215 215 / 40%); */
            background-image: linear-gradient(to right, rgb(29, 115, 227), rgb(23, 232, 170));
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 10px rgb(30, 216, 176,0.5));

        }
        .content{
            font-size: 30px;
            font-family: monospace;
            text-align: center;
            word-spacing: 12px;
            line-height: 2em;
            color: #f8f8ff;
            background-color: rgb(255 255 255 / 5%);
            margin: 100px;
            padding: 40px;
            border: 1px solid rgb(255 255 255 / 10%);
            border-radius: 20px;
            box-shadow: 0 2px 30px rgb(0 0 0 /5%);
    
        }
        span{
            color: crimson;
            text-shadow: 0 0 10px rgb(186 20 20 / 60%);
        }
    </style>
</head>
<body>
    <h1>Life Like a Coding</h1>
    <div class="content">
        <p>Hidup itu seperti koding; jika ada bug, jangan <span>menyerah</span>. Perbaiki, compile ulang, dan tunjukkan pada dunia bahwa kamu bisa
    
        Kesalahan bukan tanda kegagalan, melainkan bukti bahwa kamu <span>berani</span> mencoba sesuatu yang orang lain takutkan</p>

    </div>
</body>
</html>
