<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: #ebeaea;
        }
        /* Try Margin */
        .box1{
            width: 300px;
            height: 300px;
            background-color: coral;
            margin-top: 50px;
            margin-left: -20px;
            margin-right: 0;    
        }

        /* Short Hand */
        .box1{
            margin: 10px 20px 30px 40px;
            padding: 10px;

            /* Add Border */
            border-left: 5px solid blue;
            border-right: 5px ridge rebeccapurple;
            /* outline: 5px solid green; */
        }
        
        /* Try Padding */
        .box2{
            width: 200px;
            height: 200px;
            background-color: rgb(255, 112, 112);
            margin: 20px;

            padding-top: 20px;
            padding-left: 40px;
            padding-right: 90px;
        }
    </style>
</head>
<body>
    <div class="box1">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Rem fugit nulla corrupti voluptatibus minus libero quo ex aut minima cumque.</div>
    <div class="box2">Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam explicabo accusantium animi ducimus aspernatur eveniet soluta! Deserunt modi numquam consequuntur!</div>
</body>
</html>
