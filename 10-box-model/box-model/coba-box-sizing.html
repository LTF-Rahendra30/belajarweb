<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>
    <style>
        *{
            margin: 0;
            padding: 0;

            /* Default Box-sizing Set-Up */
            box-sizing: border-box;
        }
        body{
            background-color: #ebeaea;
        }
        /* Try Margin */
        .box1{
            width: 300px;
            height: 300px;
            background-color: rgb(251, 178, 151);
            margin: 30px;
            padding: 10px;
            /* margin-top: 50px; */
            border: 5px solid red;

            /* Try Box Sizing */
            box-sizing: border-box;
        }


    </style>
</head>
<body>
    <h1>Box Sizing</h1>

    <div class="box1">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Molestiae quis architecto reiciendis iusto, recusandae amet commodi ipsam dolores eum repudiandae.</div>
</body>
</html>
