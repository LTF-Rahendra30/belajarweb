<!DOCTYPE html>
<html lang="en">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try div-span</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        .kotak{
            background-color: antiquewhite;
            border: 2px solid gainsboro;
            width: 500px;
            padding: 40px;
        }

        .highlight{
            background-color: rgb(201, 159, 128);
            color: crimson;
            font-weight: bold;
        }
    </style>
</head>
<body>
  <h1>Perbedaan Div dan Span</h1>
  <div class="kotak">
    <h2>Ini adalah Judul Artikel</h2>
    <p>
      Div adalah elemen <strong>block</strong>. Lihat
      bagaimana kotak abu-abu ini membungkus seluruh konten
      artikel.
      Di dalam paragraf ini, kita akan menggunakan span
      untuk memberi <span class="highlight">style</span>
      pada kata-kata tertentu.
    </p>
  </div>
</body>
</html>
