<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneakers-card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article class="card-product">
        <figure class="product-image">
            <img src="Sneakers1.png" alt="">
            
        </figure>
        
        <div class="product-info">
            <span class="brand-name">LUMEN FOOTWEAR</span>
            <h2 class="product-title">Classic Court White</h2>

            <p class="product-description">Dirancang untuk melengkapi gaya hidup urban yang tenang.Memberikan kesan clean dan rapi, menjadikannya pilihan sempurna untuk setiap momen santai maupun semi-formal Anda.</p>
            
            <hr>
            <div class="price-box">
                <span class="current-price">Rp 1,899,000</span>
                <span class="slashed-price">Rp 2,299,000</span>
            </div>
            
            <div class="size-selection">
                <p class="size-label">Pilih Ukuran (US):</p>
                <button class="size-item">8</button>
                <button class="size-item">9</button>
                <button class="size-item">10</button>
                <button class="size-item">11</button>
                <button class="size-item">12</button>
            </div>

            <button class="add-to-cart">TAMBAHKAN KE KERANJANG</button>
        </div>
            
    </article>
        
</body>
</html>
