<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Card 2</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-color: #f5f5f5;
            padding: 40px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .product-card{
            background-color: white;
            width: 330px;
            margin: 0 auto;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 10px 20px rgb(0 0 0 / 0.1);
        }

        .product-image{
            width: 100%;
            height: 220px;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .product-image img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-category{
            font-size: 12px;
            color: #06c;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .product-title{
            font-size: 32px;
            font-weight: bold;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .product-description{
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eeee;
        }

        .price-area{
            margin-bottom: 20px;

        }
        .price-area .price{
            font-size: 26px;
            color: black;
            font-weight: bold;

        }

        .price-area .original-price{
            font-size: 14px;
            color: #999;
            margin-left: 8px;
        }


        .size-option-wrapper{
            border: none;
        }

        .label-teks{
            font-size: 13px;
            color: #333;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .size-option{
            margin-bottom: 25px;
        }
        .size-option input[type="radio"]{
            display: none;

        }
        .size-option label{
            display: inline-block;
            width: 44px;
            height: 44px;
            border: 2px solid #eeee;
            
            /* Centering Size Option Label */
            text-align: center;
            line-height: 40px;

            margin-right: 8px;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            border-radius: 8px;
        }

        .size-option input[type="radio"]:checked + label{
            background-color: black;
            color: #e0e0e0;
            border-color: black;
        }
    </style>
</head>
<body>
    <article class="product-card">
        <figure class="product-image">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=600&auto=format&fit=crop" alt="Shoes">
        </figure>

        <p class="product-category">Nike SportsweaZ
        </p>
        <h3 class="product-title">Air Max Essential</h3>

        <p class="product-description">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Rem culpa ipsum porro quisquam excepturi!</p>

        <div class="price-area">
            <span class="price">IDR 1,899,000</span>
            <del class="original-price">IDR 2,299,000</del>
        </div>
        <form action="">
            
            <fieldset class="size-option-wrapper">
                <legend class="label-teks">Pilih Ukuran (US): </legend>
    
                <div class="size-option">
                    <input type="radio" name="size" id="s-8" value="8">
                    <label for="s-8">8</label>
    
                    <input type="radio" name="size" id="s-9" value="9">
                    <label for="s-9">9</label>
    
                    <input type="radio" name="size" id="s-10" value="10">
                    <label for="s-10">10</label>
    
                    <input type="radio" name="size" id="s-11" value="11">
                    <label for="s-11">11</label>
    
                    <input type="radio" name="size" id="s-12" value="12">
                    <label for="s-12">12</label>
                </div>
    
                <button class="buy-button">tambahkan ke keranjang</button>
            </fieldset>
        </form>
    </article>
</body>
</html>
