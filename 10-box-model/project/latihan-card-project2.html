<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Card 2</title>
</head>
<body>
    <article class="product-card">
        <figure class="product-image">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=600&auto=format&fit=crop" alt="">
        </figure>

        <p class="product-category">Nike SportsweaZ
        </p>
        <h3 class="product-title">Air Max Essential</h3>

        <p class="product-description">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Rem culpa ipsum porro quisquam excepturi!</p>

        <div class="price-area">
            <span class="price">IDR 1,899,000</span>
            <del class="original-price">IDR 2,299,000</del>
        </div>
        <form action="">
            
            <fieldset class="size-option-wrapper">
                <legend class="label-teks">Pilih Ukuran (US): </legend>
    
                <div class="size-option">
                    <input type="radio" name="size" id="s-8" value="8">
                    <label for="s-8">8</label>
    
                    <input type="radio" name="size" id="s-9" value="9">
                    <label for="s-9">9</label>
    
                    <input type="radio" name="size" id="s-10" value="10">
                    <label for="s-10">10</label>
    
                    <input type="radio" name="size" id="s-11" value="11">
                    <label for="s-11">11</label>
    
                    <input type="radio" name="size" id="s-12" value="12">
                    <label for="s-12">12</label>
                </div>
    
                <button class="buy-button"></button>
            </fieldset>
        </form>
    </article>
</body>
</html>
