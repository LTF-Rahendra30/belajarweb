<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coba Position</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: "Inter", sans-serif;
            padding: 50px;
            background-color: #f0f2f5;
            color: #333;
        }

    </style>
</head>
<body>
    <h1>Eksperimen CSS Position</h1>

    <h2>1. Position: Statix (Normal Flow)</h2>
    <div class="box satu">1</div>
    <div class="box dua">2</div>
    <div class="box tiga">3</div>
    
    <h2>2. Position: Relative</h2>
    <div class="box satu">1</div>
    <div class="box dua">2</div>
    <div class="box tiga">3</div>

    <h2>3. Position: Absolute (Relatif ke body)</h2>
    <div class="box satu">1</div>
    <div class="box dua">2</div>
    <div class="box tiga">3</div>

    <h2>4. Position: Absolute (Relative ke perent)</h2>
    <div class="container">
        <div class="box satu">1</div>
        <div class="box dua">2</div>
        <div class="box tiga">3</div>
    </div>
    
</body>
</html>
