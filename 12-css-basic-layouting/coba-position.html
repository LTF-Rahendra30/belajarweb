<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Coba Position</title>
</head>
<body>
    <h1>Eksperimen CSS Position</h1>

    <h2>1. Position: Statix (Normal Flow)</h2>
    <div class="box satu">1</div>
    <div class="box dua">2</div>
    <div class="box tiga">3</div>
    
    <h2>2. Position: Relative</h2>
    <div class="box satu">1</div>
    <div class="box dua">2</div>
    <div class="box tiga">3</div>

    <h2>3. Position: Absolute (Relatif ke body)</h2>
    <div class="box satu">1</div>
    <div class="box dua">2</div>
    <div class="box tiga">3</div>

    <h2>4. Position: Absolute (Relative ke perent)</h2>
    <div class="box satu">1</div>
    <div class="box dua">2</div>
    <div class="box tiga">3</div>
    
</body>
</html>
